version: "3.9"

services:
  backend:
    build: ./backend
    container_name: clearclaim-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/clearclaim
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: clearclaim-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clearclaim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
